name: Code Scanner and Fixer

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight

jobs:
  scan-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Verify uv
        run: uv --version

      - name: Check or Initialize pyproject.toml
        shell: bash
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "pyproject.toml missing! Creating a default one..."
            uv init --bare
            # Httpx explicit fix to avoid proxy/httpsx errors
            uv add httpx
          fi

      - name: Generate and Sync uv.lock
        run: |
          rm -f uv.lock
          uv lock --prerelease=allow
          uv sync

      - name: Run Ruff Format and Lint Checks
        run: |
          uvx ruff format .
          uvx ruff check . --select I --fix --exit-zero
          uvx ruff check . --fix --unsafe-fixes --exit-zero

      - name: Dependency Security Audit
        continue-on-error: true
        run: uvx pip-audit

      - name: Check for Changes
        id: git-check
        shell: bash
        run: |
          uv lock --check --prerelease=allow || true
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-check.outputs.changed == 'true' && github.actor != 'github-actions[bot]'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto fix linting, dependencies and bugs with uv & ruff"
          title: "Automated Bug Fixes, Sync and Linting"
          body: |
            This is an automated pull request generated by
            
